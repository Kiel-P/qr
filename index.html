<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran QRIS - Kiheo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="payment-card">
        <div class="header">
            <h1>Pembayaran Kiheo</h1>
            <p>NMID: ID1022202979418</p>
        </div>

        <div class="qris-container">
            <img src="qrkk.png" alt="QRIS Kiheo" class="qris-image">
        </div>

        <div class="instructions">
            <h3>Cara Bayar dengan QRIS:</h3>
            <div class="step-container">
                <div class="step">
                    <div class="step-icon">1</div>
                    Buka Aplikasi<br>M-Banking/E-Wallet
                </div>
                <div class="step">
                    <div class="step-icon">2</div>
                    Scan QR Code<br>di atas
                </div>
                <div class="step">
                    <div class="step-icon">3</div>
                    Masukkan Nominal<br>& Bayar
                </div>
            </div>
        </div>

        <div class="thank-you-note">
            <span>Terima Kasih!</span>
            Atas kepercayaan Anda berbelanja di Kiheo.
        </div>

        <div class="footer">
            SATU <span>QRIS</span> UNTUK SEMUA
        </div>
    </div>

</body>
</html>
